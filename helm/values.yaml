# Kubernetes namespace to deploy into
namespace: sre-tools-dev

# Image pull secret for GitLab container registry
# Create with: kubectl create secret docker-registry gitlab-registry-secret \
#   --docker-server=registry.gitlab.com \
#   --docker-username=<user> --docker-password=<deploy-token> \
#   -n sre-tools-dev
imagePullSecrets:
  - name: gitlab-registry-secret

# Override chart/release name if needed
nameOverride: ""
fullnameOverride: ""

# ─── Backend ────────────────────────────────────────────────────────────────
backend:
  image:
    repository: registry.gitlab.com/altonetwork/sre-automation/sre-deploy-manager/backend
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1
  port: 4000

  # Non-sensitive env vars
  env:
    NODE_ENV: production
    FRONTEND_URL: https://sre-deploy.local.altodev.id
    IVANTI_BASE_URL: "http://ivanti.local.altodev.id/HEAT/api/odata/businessobject/changes"

  # Name of the pre-existing Secret containing sensitive keys:
  #   DATABASE_URL, JWT_SECRET, IVANTI_API_KEY
  # Create with: kubectl create secret generic sre-deploy-manager-backend \
  #   --from-literal=DATABASE_URL='...' \
  #   --from-literal=JWT_SECRET='...' \
  #   --from-literal=IVANTI_API_KEY='...' \
  #   -n sre-tools-dev
  secretName: sre-deploy-manager-backend

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ─── Frontend ───────────────────────────────────────────────────────────────
frontend:
  image:
    repository: registry.gitlab.com/altonetwork/sre-automation/sre-deploy-manager/frontend
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1
  port: 80

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ─── Ingress ─────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: haproxy
  host: sre-deploy.local.altodev.id
  tlsSecretName: sre-deploy-dev-tls
  annotations: {}
