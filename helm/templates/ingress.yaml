{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sre-deploy-manager.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sre-deploy-manager.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # All traffic goes to the frontend; nginx proxies /api/ and /socket.io/
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sre-deploy-manager.fullname" . }}-frontend
                port:
                  name: http
{{- end }}
