apiVersion: v1
kind: Service
metadata:
  name: {{ include "sre-deploy-manager.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sre-deploy-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sre-deploy-manager.backendSelectorLabels" . | nindent 4 }}
