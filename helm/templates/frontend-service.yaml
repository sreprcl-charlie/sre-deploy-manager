apiVersion: v1
kind: Service
metadata:
  name: {{ include "sre-deploy-manager.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "sre-deploy-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sre-deploy-manager.frontendSelectorLabels" . | nindent 4 }}
