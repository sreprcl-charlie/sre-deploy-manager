apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-deploy-nginx-conf
  namespace: web-deploy-sre
  labels:
    app: sre-deploy-manager
    component: frontend
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml;

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy ke backend service (sre-deploy-backend:4000 di namespace yg sama)
        location /api/ {
            proxy_pass http://sre-deploy-backend:4000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /socket.io/ {
            proxy_pass http://sre-deploy-backend:4000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
