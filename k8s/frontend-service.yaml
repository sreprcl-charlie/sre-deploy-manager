apiVersion: v1
kind: Service
metadata:
  name: sre-deploy-frontend
  namespace: web-deploy-sre
  labels:
    app: sre-deploy-manager
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: sre-deploy-manager
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
