apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-deploy-frontend
  namespace: web-deploy-sre
  labels:
    app: sre-deploy-manager
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-deploy-manager
      component: frontend
  template:
    metadata:
      labels:
        app: sre-deploy-manager
        component: frontend
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: frontend
          image: registry.gitlab.com/altonetwork/sre-automation/sre-deploy-manager/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: sre-deploy-nginx-conf
