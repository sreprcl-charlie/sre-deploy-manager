# nginx config for SRE Deploy Manager frontend
#
# BACKEND_SVC: the hostname of the backend container/k8s service.
#   Docker Compose : service name defined in docker-compose.yml  (default: backend)
#   Kubernetes     : k8s Service name in the same namespace      (default: sre-deploy-backend)
#
# Change the proxy_pass values below to match your deployment environment.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── REST API proxy ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Socket.io (WebSocket) proxy ─────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── SPA fallback — all unknown routes → index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin" always;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
